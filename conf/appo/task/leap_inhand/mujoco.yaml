# @package _global_
training:
  task_name: LeapInhandRotation
  sim_backend: mujoco
  play_steps: 200
  render_spacing: 0.5
  cam_distance: 0.45
  cam_lookat: [0.0, 0.0, 0.52]
  cam_elevation: -25.0
  cam_azimuth: 135.0
  play_env_num: 1
  render_width: 640
  render_height: 352
  render_num_processes: 1
  replay_queue_size: 4
  checkpoint_video:
    enabled: true
    play_steps: 200
    play_env_num: 1
    output_subdir: videos
algo:
  num_envs: 1024
  steps_per_env: 8
  max_iterations: 600
  save_interval: 50
  algorithm:
    value_loss_coef: 4.0
    entropy_coef: 0.002
    entropy_coef_schedule:
      initial: 0.002
      final: 0.0
      start_iteration: 0
      end_iteration: 600
    action_std_schedule:
      initial: 0.5
      final: 0.15
      start_iteration: 0
      end_iteration: 600
      min_std: 0.10
      max_std: 0.60
    learning_rate: 0.001
    desired_kl: 0.02
    adaptive_kl_factor: 2.0
    adaptive_lr_factor: 1.5
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.998
    lam: 0.98
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
  actor:
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: rsl_rl.modules.distribution.GaussianDistribution
      init_std: 0.5
      std_type: scalar
  critic:
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
reward:
  scales:
    rotate: 2.0
    reverse_rotate: -6.0
    rotation_streak: 1.0
    stall: -0.25
    contact_rotation: 2.0
    window_rotation: 2.0
    palm_contact: -0.5
    obj_linvel: -0.5
    pose_diff: 0.0
    torque: -0.001
    work: -0.0001
    drop: -10.0
  angvel_clip_min: 0.0
  angvel_clip_max: 0.6
  reverse_angvel_clip_max: 1.0
  minimum_positive_angvel: 0.10
  rotation_window_seconds: 1.0
  rotation_streak_target_seconds: 2.0
  stall_grace_seconds: 1.5
  contact_rotation_min_contacts: 2
  reset_z_threshold: 0.54
  rotation_warmup_seconds: 0.5
env:
  gen_grasp: false
  use_grasp_cache: true
  grasp_cache_path: caches/leap_hand_seed_bank.npy
  grasp_cache_sample_mode: random
  max_episode_seconds: 20.0
  rotation_axis: [0.0, 0.0, 1.0]
  rotation_cycle_seconds: 2.0
  ctrl_dt: 0.02
  control_config:
    action_scale: 0.020
    target_mode: bounded_incremental
    target_offset_limit: 0.30
    kp: 20.0
    kd: 1.5
  noise_config:
    level: 0.0
    scale_joint_angle: 0.02
  domain_rand:
    randomize_base_mass: false
    random_com: false
    randomize_gravity: false
    push_robots: false
    joint_noise: 0.0
    ball_vel_noise: 0.0
    ball_z_offset: 0.0
