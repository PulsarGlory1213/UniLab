# @package _global_
training:
  task_name: LeapInhandRotation
  sim_backend: mujoco
  play_steps: 400
  render_spacing: 0.5
  cam_distance: 0.45
  cam_lookat: [0.0, 0.0, 0.52]
  cam_elevation: -25.0
  cam_azimuth: 135.0
  play_env_num: 1
  render_width: 640
  render_height: 352
  render_num_processes: 1
  replay_queue_size: 4
  checkpoint_video:
    enabled: true
    play_steps: 400
    play_env_num: 1
    output_subdir: videos

algo:
  # Fine-tuning configuration for the already successful rotation policy.
  num_envs: 1024
  steps_per_env: 64
  max_iterations: 300
  save_interval: 50

  algorithm:
    value_loss_coef: 4.0

    # Keep exploration small enough to preserve the good grasping strategy,
    # while still allowing the policy to discover more efficient finger motion.
    entropy_coef: 0.0012
    entropy_coef_schedule:
      initial: 0.0012
      final: 0.0003
      start_iteration: 0
      end_iteration: 300

    action_std_schedule:
      initial: 0.16
      final: 0.08
      start_iteration: 0
      end_iteration: 300
      min_std: 0.06
      max_std: 0.22

    learning_rate: 0.0001
    desired_kl: 0.02
    adaptive_kl_factor: 2.0
    adaptive_lr_factor: 1.5
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.998
    lam: 0.98
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive

  actor:
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: rsl_rl.modules.distribution.GaussianDistribution
      init_std: 0.16
      std_type: scalar

  critic:
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true

reward:
  scales:
    # Instantaneous reward stays close to the last successful configuration.
    stable_rotation: 4.0

    # New term: integrated positive rotation over the last time window,
    # multiplied by whole-window axis efficiency.
    window_rotation_progress: 3.0

    rotation_streak: 0.5
    stall: -1.0

    thumb_contact: 0.10
    support_contact: 0.15

    ball_center: -2.5
    center_recovery: 1.0
    obj_linvel: -0.4

    action_rate: -0.008
    thumb_distal_posture: -0.02

    # Per-step dynamic penalties remain disabled. The new window reward
    # evaluates efficiency without punishing brief corrective motions.
    off_axis_angvel: 0.0
    angvel_rate: 0.0

    palm_contact: -1.0
    reverse_rotate: -4.0
    drop: -50.0
    torque: -0.001
    work: -0.0001

    rotate: 0.0
    contact_rotation: 0.0
    window_rotation: 0.0
    pose_diff: 0.0

  angvel_clip_min: 0.0
  angvel_clip_max: 0.8
  reverse_angvel_clip_max: 1.0

  # Preserve the safe instantaneous target learned by the successful policy.
  target_angvel: 0.30
  target_angvel_tolerance: 0.30

  # The one-second integrated reward gently asks for slightly more progress
  # without forcing every individual control step to run at 0.33 rad/s.
  window_progress_target_angvel: 0.33

  minimum_positive_angvel: 0.05

  rotation_window_seconds: 1.0
  rotation_streak_target_seconds: 2.0
  stall_grace_seconds: 1.0

  stable_rotation_min_contacts: 2
  contact_rotation_min_contacts: 2

  stable_center_radius: 0.025
  stable_ball_linvel_max: 0.08

  # Continuous center feedback: no deadzone, so the thumb receives an
  # immediate signal when the ball begins to drift.
  ball_center_xy_deadzone: 0.0
  ball_center_z_deadzone: 0.0
  ball_center_xy_scale: 0.018
  ball_center_z_scale: 0.015
  ball_center_penalty_clip: 16.0

  # Kept for backward compatibility; their reward weights above are zero.
  off_axis_angvel_scale: 0.30
  off_axis_angvel_penalty_clip: 9.0
  angvel_delta_scale: 0.08
  angvel_delta_penalty_clip: 9.0

  recovery_activation_distance: 0.004
  recovery_progress_scale: 0.003

  max_ball_center_distance: 0.050
  max_ball_drop_from_init: 0.040
  reset_z_threshold: 0.54

  rotation_warmup_seconds: 0.25

  thumb_distal_q14_scale: 0.30
  thumb_distal_q15_scale: 0.25
  thumb_root_action_rate_weight: 0.50
  thumb_distal_action_rate_weight: 1.25

env:
  gen_grasp: false
  use_grasp_cache: true
  grasp_cache_path: caches/leap_hand_seed_bank.npy
  grasp_cache_sample_mode: random
  max_episode_seconds: 20.0
  rotation_axis: [0.0, 0.0, 1.0]
  rotation_cycle_seconds: 2.0
  ctrl_dt: 0.02

  control_config:
    # Actuator order is [1,0,2,3, 5,4,6,7, 9,8,10,11, 12,13,14,15].
    # The final four are the thumb chain q12 -> q13 -> q14 -> q15.
    # q12/q13 move the whole thumb; q14/q15 only fine-tune the contact surface.
    action_scale:
      [
        0.018, 0.018, 0.018, 0.016,
        0.018, 0.018, 0.018, 0.016,
        0.018, 0.018, 0.018, 0.016,
        0.030, 0.028, 0.014, 0.010
      ]
    target_mode: bounded_incremental
    target_offset_limit:
      [
        0.30, 0.30, 0.30, 0.28,
        0.30, 0.30, 0.30, 0.28,
        0.30, 0.30, 0.30, 0.28,
        0.45, 0.40, 0.22, 0.18
      ]
    kp: 20.0
    kd: 1.5

  noise_config:
    level: 0.0
    scale_joint_angle: 0.02

  domain_rand:
    recovery_reset_fraction: 0.15
    thumb_root_noise: 0.05
    thumb_distal_noise: 0.015
    ball_xy_offset: 0.002

    joint_noise: 0.0
    ball_vel_noise: 0.0
    ball_z_offset: 0.0

    randomize_base_mass: false
    random_com: false
    randomize_gravity: false
    push_robots: false