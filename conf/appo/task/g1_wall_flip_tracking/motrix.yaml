# @package _global_
defaults:
  - /task/g1_wall_flip_tracking/base
  - _self_

training:
  task_name: G1WallFlipTracking
  sim_backend: motrix
algo:
  max_iterations: 5000
  algorithm:
    num_learning_epochs: 5
    num_mini_batches: 4
    entropy_coef: 0.01
    desired_kl: 0.01
reward:
  scales:
    motion_body_pos: 1.0
    motion_body_ori: 1.0
    action_rate_l2: -0.1
