# @package _global_
# Shared cross-backend config for g1_wall_flip_tracking (mujoco/motrix). See AGENTS.md (Sim2Sim).

training:
  play_steps: 1000
algo:
  num_envs: 1024
  max_iterations: 7000
  save_interval: 500
  algorithm:
    num_learning_epochs: 6
    num_mini_batches: 8
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    value_loss_coef: 1.0
    entropy_coef: 0.005
    learning_rate: 0.001
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
    desired_kl: 0.008
    adaptive_kl_factor: 2.0
    adaptive_lr_factor: 1.5
    optimizer: adam
    tau: 1.0
    target_update_freq: 1
    vtrace_clip_rho: 1.0
    vtrace_clip_c: 1.0
    enable_compile: true
reward:
  scales:
    motion_global_root_pos: 0.5
    motion_global_root_ori: 0.5
    motion_body_pos: 2.0
    motion_body_ori: 1.5
    motion_body_lin_vel: 1.0
    motion_body_ang_vel: 1.0
    motion_joint_pos: 0.0
    motion_joint_vel: 0.0
    action_rate_l2: -0.005
    joint_limit: -10.0
  std_root_pos: 0.3
  std_root_ori: 0.4
  std_body_pos: 0.3
  std_body_ori: 0.4
  std_body_lin_vel: 1.0
  std_body_ang_vel: 3.14
  std_joint_pos: 0.2
  std_joint_vel: 1.0
