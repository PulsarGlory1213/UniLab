# @package _global_

training:
  task_name: LeapBallCatch
  sim_backend: motrix
  play_steps: 200
  play_env_num: 16
  render_spacing: 0.35
  cam_distance: 0.45
  cam_lookat: [0.0, 0.0, 0.62]
  cam_elevation: -25.0
  cam_azimuth: 135.0
  render_width: 640
  render_height: 352
  render_num_processes: 1
  replay_queue_size: 4
  checkpoint_video:
    enabled: false
    play_steps: 200
    play_env_num: 16
    output_subdir: videos

algo:
  num_envs: 1024
  steps_per_env: 8
  max_iterations: 1000
  # APPO always saves the final model_<max_iterations>.pt. Setting this to 0
  # disables extra periodic checkpoints such as model_500.pt.
  save_interval: 0
  algorithm:
    value_loss_coef: 4.0
    entropy_coef: 0.003
    learning_rate: 0.0003
    desired_kl: 0.015
    adaptive_kl_factor: 1.5
    adaptive_lr_factor: 1.2
    num_learning_epochs: 5
    num_mini_batches: 4
    clip_param: 0.2
    gamma: 0.99
    lam: 0.95
    max_grad_norm: 1.0
    use_clipped_value_loss: true
    schedule: adaptive
  actor:
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: rsl_rl.modules.distribution.GaussianDistribution
      init_std: 0.45
      std_type: scalar
  critic:
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true

reward:
  scales:
    # Exponential tracking of a phase-dependent initial -> catch reference.
    # The reference shapes reward only; APPO still controls all trainable joints.
    reference_pose_tracking: 8.0
    early_closure: -14.0
    finger_pad_progress: 14.0
    grasp_surface_layout: 8.0
    finger_closing: 4.0
    pocket_depth: 12.0
    high_ball: -12.0

    # Contact outcomes remain strict: all four pads must enclose the ball.
    wrap_progress: 12.0
    finger_wrap: 34.0
    hold: 18.0

    # Penalize distant pads, non-planar curling, and post-catch oscillation.
    finger_gap: -12.0
    finger_synergy: -10.0
    bad_pad_contact: -8.0
    finger_jitter: -6.0
    palm_assist: 5.0
    palm_only: -8.0
    pocket_without_finger_contact: -14.0
    ball_bounce: -18.0
    action_rate: -3.0
    settled_action: -5.0
    torque: -0.0005
    drop: -150.0
  angvel_clip_min: -0.5
  angvel_clip_max: 0.5
  reset_z_threshold: 0.4

env:
  gen_grasp: true
  max_episode_seconds: 3.0
  ctrl_dt: 0.01
  grasp_cache_path: caches/leap_ball_catch.npy

  # Desired ball center in the finger-root pocket, expressed as a palm-frame
  # offset from the three main-finger MCP row.
  grasp_pocket_offset: [0.005, 0.012, -0.045]
  # Photo-derived waiting cup. Compiled order per main finger is
  # [base flex, spread, middle flex, tip flex], followed by four thumb DOFs.
  initial_pose: [0.35, -0.25, 0.60, 0.45, 0.30, 0.0, 0.66, 0.50, 0.35, 0.30, 0.72, 0.55, 1.0, 1.0, 0.20, 0.40]
  # Desired final grasp. This is only an exponential-reward reference.
  catch_pose: [0.65, -0.50, 1.35, 0.90, 0.6, 0.0, 1.36, 0.70, 0.8, 0.50, 1.52, 1.10, 1.0, 1.0, 0.7, 1.0]
  catch_close_trigger_height: 0.11
  catch_full_close_height: 0.015
  early_closure_tolerance: 0.12
  reference_pose_sigma: 4.0
  reference_pose_joint_weights: [1.3, 4.0, 1.5, 1.6, 1.3, 4.0, 1.5, 1.6, 1.3, 4.0, 1.5, 1.6, 4.0, 1.6, 1.7, 1.7]
  catch_spread_tolerance: 0.02
  catch_spread_limit: 0.08
  # Keep the first thumb DOF exactly at initial_pose[12]; all other joints remain trainable.
  locked_catch_dof_indices: [12]
  # none=train normally; initial/catch/both are visualization-only modes.
  pose_preview: none
  thumb_pregrasp_pose: [0.8, 0.6, 0.9, 0.6]
  natural_grasp_pose: [0.62, -0.14, 0.78, 0.38, 0.74, 0.0, 0.88, 0.46, 0.84, 0.06, 1.04, 0.58, 0.72, 0.48, 0.62, 0.32]
  closing_grasp_pose: [1.0, -0.14, 1.15, 0.72, 1.12, 0.0, 1.28, 0.82, 1.0, 0.0, 1.6, 0.5, 1.4, 0.6, 0.5, 0.5]

  # Reset-only falling-ball uncertainty.
  ball_spawn_x_range: [0.008, 0.024]
  ball_spawn_y_range: [0.016, 0.028]
  ball_spawn_height_range: [0.82, 0.88]
  ball_horizontal_velocity_range: [-0.08, 0.08]
  ball_vertical_velocity_range: [-0.08, 0.0]
  ball_radius: 0.0335
  fingertip_surface_margin: 0.006

  # Faster Motrix control for catching a falling tennis-sized ball.
  control_config:
    action_scale: 0.14
    kp: 34.0
    kd: 2.80

  domain_rand:
    randomize_base_mass: false
    random_com: false
    randomize_gravity: false
    push_robots: false
    joint_noise: 0.01
    ball_vel_noise: 0.0
    ball_z_offset: 0.0
