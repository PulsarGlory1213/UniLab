# @package _global_
defaults:
  - /task/go1_joystick_flat/base
  - _self_

training:
  task_name: Go1JoystickFlat
  sim_backend: motrix
algo:
  num_envs: 1024
  steps_per_env: 24
  max_iterations: 300
  actor:
    distribution_cfg:
      init_std: 0.5
  algorithm:
    learning_rate: 0.0005
    entropy_coef: 0.001
    desired_kl: 0.008
env:
  sim_dt: 0.01
  commands:
    vel_limit:
    - - 0.5
      - 0.0
      - 0.0
    - - 0.5
      - 0.0
      - 0.0
reward:
  scales:
    action_rate: -0.015
    action_smooth: -0.01
    similar_to_default: -0.15
    swing_feet_z: 2.0
