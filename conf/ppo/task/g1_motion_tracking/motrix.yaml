# @package _global_
defaults:
  - /task/g1_motion_tracking/base
  - _self_

training:
  task_name: G1MotionTracking
  sim_backend: motrix
  play_env_num: 16
algo:
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 1.5
    scale_gyro: 0.2
play_profile:
  enabled: true
  env:
    render_spacing: 2.5
  scene:
    enabled: true
    source_model_file: src/unilab/assets/robots/g1/scene_flat.xml
    ground_texture_file: src/unilab/assets/robots/g1/textures/floor.png
    skybox_rgb1:
    - 0.9
    - 0.9
    - 0.91
    skybox_rgb2:
    - 0.68
    - 0.68
    - 0.7
    ground_texrepeat:
    - 0.25
    - 0.25
reward:
  scales:
    motion_global_root_pos: 1.0
    action_rate_l2: -0.05
    undesired_contacts: -0.1
