# @package _global_
training:
  task_name: LeapInhandRotation
  sim_backend: mujoco
  render_spacing: 0.5
  cam_distance: 0.45
  cam_lookat: [0.0, 0.0, 0.52]
  cam_elevation: -25.0
algo:
  num_envs: 2048
  num_steps_per_env: 8
  max_iterations: 500
  obs_groups:
    actor: [policy]
    critic: [policy]
  actor:
    class_name: rsl_rl.models.MLPModel
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
    distribution_cfg:
      class_name: rsl_rl.modules.distribution.GaussianDistribution
      init_std: 1.0
      std_type: scalar
  critic:
    class_name: rsl_rl.models.MLPModel
    hidden_dims: [512, 256, 128]
    activation: elu
    obs_normalization: true
  algorithm:
    value_loss_coef: 4.0
    desired_kl: 0.02
reward:
  scales:
    rotate: 2.0
    obj_linvel: -0.3
    pose_diff: -0.03
    torque: -0.01
    work: -0.001
    drop: 0.0
  angvel_clip_min: -0.5
  angvel_clip_max: 0.5
  reset_z_threshold: 0.54
env:
  gen_grasp: false
  max_episode_seconds: 20.0
  grasp_cache_path: caches/leap_hand_allegro_style_20k.npy
  rotation_axis: [0.0, 0.0, 1.0]
  ctrl_dt: 0.02
  control_config:
    action_scale: 0.08
    kp: 20.0
    kd: 1.5
  domain_rand:
    randomize_base_mass: false
    random_com: false
    randomize_gravity: false
    push_robots: false
    joint_noise: 0.015
    ball_vel_noise: 0.01
    ball_z_offset: 0.0
play_profile:
  enabled: true
  env:
    render_spacing: 1.0
