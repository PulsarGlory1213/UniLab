# @package _global_
defaults:
  - /task/g1_box_tracking/base
  - _self_

training:
  task_name: G1BoxTracking
  sim_backend: motrix
  play_env_num: 16
algo:
  max_iterations: 40000
  empirical_normalization: true
  obs_groups:
    critic:
    - critic
  algorithm:
    entropy_coef: 0.002
    desired_kl: 0.01
  noise_config:
    level: 1.0
    scale_joint_angle: 0.01
    scale_joint_vel: 1.5
    scale_gyro: 0.2
play_profile:
  enabled: true
  env:
    render_spacing: 2.5
  scene:
    enabled: true
    source_model_file: src/unilab/assets/robots/g1/scene_flat_with_largebox.xml
    ground_texture_file: src/unilab/assets/robots/g1/textures/floor.png
    skybox_rgb1:
    - 0.9
    - 0.9
    - 0.91
    skybox_rgb2:
    - 0.68
    - 0.68
    - 0.7
    ground_texrepeat:
    - 0.25
    - 0.25
reward:
  scales:
    motion_global_root_pos: 1.0
    motion_body_ori: 1.5
    motion_body_ang_vel: 1.5
    object_global_ref_position_error_exp: 4.0
    object_global_ref_orientation_error_exp: 3.0
  std_object_pos: 0.12
  std_object_ori: 0.2
