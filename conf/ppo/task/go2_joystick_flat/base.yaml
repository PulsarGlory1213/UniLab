# @package _global_
# Shared cross-backend config for go2_joystick_flat (mujoco/motrix). See AGENTS.md (Sim2Sim).

algo:
  num_envs: 1024
  max_iterations: 151
  empirical_normalization: true
  obs_groups:
    actor:
    - actor
  policy:
    init_noise_std: 0.5
  algorithm:
    learning_rate: 0.0003
    entropy_coef: 0.001
reward:
  scales:
    tracking_lin_vel: 1.0
    tracking_ang_vel: 0.2
    lin_vel_z: -5.0
    ang_vel_xy: -0.1
    base_height: -100.0
    action_rate: -0.005
    similar_to_default: -0.1
    contact: 0.24
    swing_feet_z: 4.0
  tracking_sigma: 0.25
  base_height_target: 0.3
